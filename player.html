<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna TV | Player</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #playerMain,
    .player-container {
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .player-container {
      position: relative;
    }

    video,
    iframe,
    img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      border: none;
      display: block;
    }

    .mensagem {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-size: 2rem;
      text-align: center;
      padding: 24px;
    }

    .mensagem small {
      display: block;
      max-width: 900px;
      color: #bfc7d5;
      font-size: 1rem;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <main id="playerMain">
    <div class="player-container">
      <div class="mensagem">Carregando player...</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="player.js?v=201"></script>
</body>
</html>
