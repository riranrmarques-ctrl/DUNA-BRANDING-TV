<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna TV | Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .player-container {
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    video,
    iframe,
    img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      border: none;
      display: block;
    }

    .mensagem {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-size: 2rem;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div class="player-container">
    <video id="videoPlayer" autoplay muted playsinline></video>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="player.js?v=1"></script>
</body>
</html>
