<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna TV Player</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .app-shell {
      width: 100vw;
      height: 100vh;
      display: flex;
      background: #000;
      overflow: hidden;
    }

    .weather-sidebar {
      width: 190px;
      min-width: 190px;
      background: linear-gradient(180deg, #0b1320 0%, #101a2b 100%);
      color: #fff;
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.08);
      z-index: 5;
    }

    .weather-topo {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .weather-logo {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 6px;
    }

    .weather-logo img {
      max-width: 132px;
      max-height: 72px;
      object-fit: contain;
      display: block;
    }

    .weather-cidade {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.1;
    }

    .weather-temp {
      font-size: 52px;
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -1px;
    }

    .weather-desc {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.88);
      margin-top: -6px;
    }

    .weather-lista {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .weather-dia {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.92);
    }

    .weather-dia span:first-child {
      text-transform: lowercase;
    }

    .weather-rodape {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }

    .player-main {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    .player-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    video,
    img,
    iframe {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      border: 0;
    }

    .mensagem {
      color: #fff;
      font-size: 26px;
      text-align: center;
      padding: 24px;
      line-height: 1.4;
    }

    .mensagem small {
      display: block;
      margin-top: 12px;
      color: #aaa;
      font-size: 15px;
    }
  </style>
</head>
<body>

  <div class="app-shell">
    <aside class="weather-sidebar">
      <div class="weather-topo">
        <div class="weather-logo">
          <img src="logoibicui.png" alt="Prefeitura de Ibicuí">
        </div>

        <div class="weather-cidade" id="weatherCidade">Ibicuí</div>
        <div class="weather-temp" id="weatherTemp">--°</div>
        <div class="weather-desc" id="weatherDesc">Carregando...</div>

        <div class="weather-lista" id="weatherLista"></div>
      </div>

      <div class="weather-rodape">Previsão do tempo</div>
    </aside>

    <main class="player-main" id="playerMain">
      <div class="player-container">
        <div class="mensagem">
          Carregando player...
          <small>Se esta mensagem não mudar, o JavaScript não carregou.</small>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="player.js?v=16"></script>
</body>
</html>
