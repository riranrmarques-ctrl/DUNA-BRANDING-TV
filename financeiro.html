<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna | Financeiro</title>

  <link rel="stylesheet" href="financeiro.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <aside class="sidebar">
    <div class="brand">
      <img src="logo.png">
    </div>

    <button class="btn-voltar" onclick="voltarPainel()">
      ← Voltar
    </button>
  </aside>

  <main class="conteudo">

    <header class="topo">
      <div>
        <p>Financeiro</p>
        <h1>Gestão de Vendas</h1>
      </div>

      <button id="btnAtualizar">Atualizar</button>
    </header>

    <section class="cards">

      <div class="card">
        <span>Vendas do mês</span>
        <strong id="vendasMes">R$ 0,00</strong>
      </div>

      <div class="card">
        <span>Vendas totais</span>
        <strong id="vendasTotais">R$ 0,00</strong>
      </div>

      <div class="card">
        <span>Locais contratados</span>
        <strong id="locaisContratados">0</strong>
      </div>

      <div class="card alerta">
        <span>Encerrando em 30 dias</span>
        <strong id="contratosEncerrando">0</strong>
      </div>

    </section>

    <section class="grid">

      <div class="painel grande">
        <div class="painel-topo">
          <div>
            <h2>Vendas por mês</h2>
            <p>Evolução dos contratos</p>
          </div>
        </div>
        <canvas id="graficoVendas"></canvas>
      </div>

      <div class="painel">
        <div class="painel-topo">
          <div>
            <h2>Encerramentos</h2>
            <p>Contratos por mês</p>
          </div>
        </div>
        <canvas id="graficoEncerramentos"></canvas>
      </div>

    </section>

    <section class="grid inferior">

      <div class="painel">
        <div class="painel-topo">
          <div>
            <h2>Ranking financeiro</h2>
          </div>
        </div>

        <div id="rankingFinanceiro" class="ranking"></div>
      </div>

      <div class="painel grande">

        <div class="painel-topo">
          <div>
            <h2>Contratos</h2>
            <p>Clientes ativos</p>
          </div>
        </div>

        <div class="tabela-wrap">
          <table>
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Código</th>
                <th>Valor</th>
                <th>Postagem</th>
                <th>Vencimento</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody id="tabelaContratos"></tbody>
          </table>
        </div>

      </div>

    </section>

  </main>

  <script src="financeiro.js"></script>

</body>
</html>
