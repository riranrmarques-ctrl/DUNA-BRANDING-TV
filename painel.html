<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna Branding | Painel</title>
  <link rel="stylesheet" href="painel.css?v=96">
</head>
<body>

  <div id="loginBox" class="login-screen">
    <div class="login-card">
      <h2>Acesso ao Painel</h2>
      <input type="password" id="senhaInput" placeholder="Digite o código">
      <button id="btnLogin" type="button">Entrar</button>
      <p id="loginErro" class="login-erro"></p>
    </div>
  </div>

  <div id="conteudoPainel" style="display:none;">
    <div class="logo-top">
      <img src="logo.png" alt="Duna TV">
    </div>

    <div class="painel-shell">
      <div id="listaPontos">
        <div class="painel-header">
          <h1>Painel de Pontos</h1>
          <p>Gerencie seus pontos e playlists.</p>
        </div>

        <div class="pontos-box">

          <!-- (mantive TODOS os cards exatamente iguais) -->

          <!-- ... TODOS OS CARDS QUE VOCÊ JÁ TEM ... -->

        </div>
      </div>

      <div id="pontoDetalhe" class="playlist-box" style="display:none;">
        <div class="playlist-topbar">
          <button id="btnVoltar" type="button" class="btn-secundario btn-voltar-topo">← Voltar</button>
        </div>

        <div class="playlist-header playlist-header-novo">
          <div class="playlist-header-textos">
            <h2 id="tituloPasta">Pasta do ponto</h2>
            <p>Gerencie e organize a sua playlist</p>

            <div class="playlist-codigo-linha">
              <span id="codigoAtual"></span>
              <button id="btnCopiarCodigo" type="button" class="btn-copiar-playlist">⧉</button>
            </div>
          </div>
        </div>

        <div class="playlist-layout-novo">
          <div class="midia-toolbar">
            <div class="upload-card">
              <div class="upload-card-topo">
                <h3>Adicionar mídia</h3>
                <span class="upload-info">Aceita MP4, JPG e TXT com URL</span>
              </div>

              <div class="upload-linha">
                <input type="file" id="videoInput" accept=".mp4,.jpg,.txt">

                <select id="clienteSelect">
                  <option value="">Selecionar cliente</option>
                </select>

                <button id="btnUpload" type="button">Adicionar</button>
              </div>

              <div class="upload-datas">
                <div class="upload-data-campo">
                  <label for="dataInicio">Início</label>
                  <input type="date" id="dataInicio">
                </div>

                <div class="upload-data-campo">
                  <label for="dataFim">Encerramento</label>
                  <input type="date" id="dataFim">
                </div>
              </div>
            </div>
          </div>

          <div class="playlist-coluna-ativa">
            <div class="playlist-secao playlist-secao-ativa">
              <div class="playlist-secao-topo">
                <h4>Playlist ativa</h4>
              </div>
              <div id="playlistAtiva"></div>
            </div>
          </div>

          <div class="playlist-secao playlist-secao-historico">
            <div class="playlist-secao-topo">
              <h4>Histórico</h4>
            </div>
            <div id="playlistInativa"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="status" class="status-box">Painel Ativo</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="painel.js?v=96"></script>
</body>
</html>
