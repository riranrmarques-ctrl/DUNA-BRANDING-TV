  <!-- LOGIN -->
  <div id="loginBox" class="login-box">
    <h2>Acesso ao Painel</h2>
    <input type="password" id="senhaInput" placeholder="Digite o código">
    <button id="btnLogin">Entrar</button>
    <p id="loginErro"></p>
  </div>

    </div>

    <div id="pontoDetalhe" class="playlist-box" style="display:none;">
      <div class="playlist-header">
        <h2>Pasta do ponto <span id="codigoAtual"></span></h2>
        <p id="nomeAtual"></p>
      </div>

      <div class="painel-topo">
        <input type="file" id="videoInput" accept="video/*">
