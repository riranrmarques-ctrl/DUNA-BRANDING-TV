<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna Branding | Painel</title>
  <link rel="stylesheet" href="painel.css">
</head>
<body>

  <div class="logo-top">
    <img src="logo.png" alt="Duna TV">
  </div>

  <div class="page-title">
    <h1>Painel de Pontos</h1>
    <p>Escolha um dos 5 códigos fixos para gerenciar a playlist.</p>
  </div>

  <div class="painel-box">
    <div id="status" class="status-box">Painel pronto.</div>
  </div>

  <div id="listaPontos" class="pontos-box">
    <div class="card-ponto" data-codigo="0001">
      <div class="card-codigo">0001</div>
      <div class="card-nome">Carregando...</div>
      <div class="card-acoes">
        <button class="btn-copiar" data-codigo="0001">Copiar código</button>
        <button class="btn-abrir" data-codigo="0001">Abrir</button>
      </div>
    </div>

    <div class="card-ponto" data-codigo="0002">
      <div class="card-codigo">0002</div>
      <div class="card-nome">Carregando...</div>
      <div class="card-acoes">
        <button class="btn-copiar" data-codigo="0002">Copiar código</button>
        <button class="btn-abrir" data-codigo="0002">Abrir</button>
      </div>
    </div>

    <div class="card-ponto" data-codigo="0003">
      <div class="card-codigo">0003</div>
      <div class="card-nome">Carregando...</div>
      <div class="card-acoes">
        <button class="btn-copiar" data-codigo="0003">Copiar código</button>
        <button class="btn-abrir" data-codigo="0003">Abrir</button>
      </div>
    </div>

    <div class="card-ponto" data-codigo="0004">
      <div class="card-codigo">0004</div>
      <div class="card-nome">Carregando...</div>
      <div class="card-acoes">
        <button class="btn-copiar" data-codigo="0004">Copiar código</button>
        <button class="btn-abrir" data-codigo="0004">Abrir</button>
      </div>
    </div>

    <div class="card-ponto" data-codigo="0005">
      <div class="card-codigo">0005</div>
      <div class="card-nome">Carregando...</div>
      <div class="card-acoes">
        <button class="btn-copiar" data-codigo="0005">Copiar código</button>
        <button class="btn-abrir" data-codigo="0005">Abrir</button>
      </div>
    </div>
  </div>

  <div id="pontoDetalhe" class="playlist-box" style="display:none;">
    <div class="playlist-header">
      <h2>Ponto <span id="codigoAtual">0001</span></h2>
      <p id="nomeAtual">Nome do ponto</p>
    </div>

    <div class="painel-topo">
      <div class="campo">
        <label for="videoInput">Escolha o vídeo</label>
        <input type="file" id="videoInput" accept="video/*">
      </div>

      <div class="campo campo-botao">
        <label>&nbsp;</label>
        <button id="btnUpload">Enviar vídeo</button>
      </div>

      <div class="campo campo-botao">
        <label>&nbsp;</label>
        <button id="btnVoltar" type="button">Voltar</button>
      </div>
    </div>

    <div id="playlistLista" class="playlist-lista">
      <p>Nenhum vídeo carregado.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="painel.js?v=4"></script>
</body>
</html>
