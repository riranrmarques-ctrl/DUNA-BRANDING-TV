<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna Branding | Painel</title>
  <link rel="stylesheet" href="painel.css?v=101">
</head>
<body>

  <div id="loginBox" class="login-screen">
    <div class="login-card">
      <h2>Acesso ao Painel</h2>
      <input type="password" id="senhaInput" placeholder="Digite o código">
      <button id="btnLogin" type="button">Entrar</button>
      <p id="loginErro" class="login-erro"></p>
    </div>
  </div>

  <div id="conteudoPainel" style="display:none;">

    <div class="menu-lateral-esquerdo">
      <div class="menu-lateral-aba">
        <span>MENU</span>
      </div>

      <div class="menu-lateral-painel">
        <div class="menu-lateral-conteudo">
          <button class="menu-item" type="button" id="btnClientes">Clientes</button>
          <button class="menu-item" type="button">Contratos</button>
          <button class="menu-item" type="button">Downloads</button>
          <button class="menu-item" type="button">Financeiro</button>
          <button class="menu-item" type="button">Relatórios</button>
          <button class="menu-item" type="button">Configuração</button>
        </div>
      </div>
    </div>

    <div class="topo-fixo">
      <div class="logo-top">
        <img src="logo.png" alt="Duna TV">
      </div>

      <div class="painel-header">
        <h1>Gerenciador de Pontos</h1>
        <p>Gerencie seus pontos e playlists.</p>
      </div>
    </div>

    <div class="painel-shell">
      <div id="listaPontos">
        <div class="pontos-box">

          <!-- (todo o restante do seu código continua exatamente igual, sem nenhuma alteração) -->

        </div>
      </div>

      <div id="pontoDetalhe" class="playlist-box" style="display:none;">
        <!-- resto igual -->
      </div>
    </div>

    <div id="status" class="status-box">Painel Ativo</div>
  </div>

  <div id="modalEditar" class="modal-editar" style="display:none;">
    <div class="modal-conteudo">
      <h3>Editar Informações</h3>

      <input type="text" id="editNome" placeholder="Nome do ponto">
      <input type="text" id="editCidade" placeholder="Cidade">
      <input type="text" id="editEndereco" placeholder="Endereço">

      <div class="edit-imagem-box">
        <img id="previewImagem" src="" alt="Preview da imagem">
        <input type="file" id="inputImagem" accept="image/*">
      </div>

      <div class="edit-botoes">
        <button id="btnSalvarEdicao" type="button">Salvar</button>
        <button id="btnFecharModal" type="button">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="painel.js?v=99"></script>
</body>
</html>
