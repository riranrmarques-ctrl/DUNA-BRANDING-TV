<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna Branding | Painel</title>
  <link rel="stylesheet" href="painel.css">
</head>
<body>

  <div class="logo-top">
    <img src="logo.png" alt="Duna TV">
  </div>

  <div class="page-title">
    <h1>Painel de Playlists</h1>
    <p>Gerencie os códigos fixos e envie vídeos direto para o Supabase.</p>
  </div>

  <div class="painel-box">
    <div class="painel-topo">
      <div class="campo">
        <label for="codigoSelect">Selecione o código</label>
        <select id="codigoSelect">
          <option value="0001">0001</option>
          <option value="0002">0002</option>
          <option value="0003">0003</option>
          <option value="0004">0004</option>
          <option value="0005">0005</option>
        </select>
      </div>

      <div class="campo">
        <label for="videoInput">Escolha o vídeo</label>
        <input type="file" id="videoInput" accept="video/*">
      </div>

      <div class="campo campo-botao">
        <label>&nbsp;</label>
        <button id="btnUpload">Enviar vídeo</button>
      </div>
    </div>

    <div id="status" class="status-box">Selecione um código para carregar a playlist.</div>
  </div>

  <div class="playlist-box">
    <div class="playlist-header">
      <h2>Playlist do código <span id="codigoAtual">0001</span></h2>
    </div>

    <div id="playlistLista" class="playlist-lista">
      <p>Nenhum vídeo carregado.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="painel.js?v=4"></script>
</body>
</html>
