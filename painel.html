<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna TV | Painel</title>
  <link rel="stylesheet" href="painel.css?v=70">
</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
  <h2>Acesso ao Painel</h2>
  <input type="password" id="senhaInput" placeholder="Digite o código">
  <button id="btnLogin">Entrar</button>
  <p id="loginErro"></p>
</div>

<!-- PAINEL -->
<div id="conteudoPainel" style="display:none;">

  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="header">
    <h1>Painel de Pontos</h1>
    <p>Gerencie seus pontos e playlists</p>
  </div>

  <div id="status" class="status-box">Painel Ativo</div>

  <div id="listaPontos" class="grid">

    <!-- CARD -->
    <script>
      const CODIGOS = [
        "H4E9L2A","N7H3E8L","E2A6H9N","L8E1N5A",
        "H6N4E7A","A9L3E2H","E5H8A1N","N2E7L4A"
      ];

      document.write(CODIGOS.map(c => `
        <div class="card-ponto" data-codigo="${c}">
          
          <div class="topo">
            <span class="nome">Carregando...</span>
            <button class="edit" data-codigo="${c}">✏</button>
          </div>

          <div class="codigo-linha">
            <span class="codigo">${c}</span>
            <button class="copy" data-codigo="${c}">📋</button>
          </div>

          <button class="abrir" data-codigo="${c}">Abrir pasta</button>

        </div>
      `).join(""));
    </script>

  </div>

  <!-- PLAYLIST -->
  <div id="pontoDetalhe" style="display:none;">
    <h2>Pasta <span id="codigoAtual"></span></h2>
    <p id="nomeAtual"></p>

    <input type="file" id="videoInput">
    <button id="btnUpload">Enviar</button>
    <button id="btnVoltar">Voltar</button>

    <div id="playlistLista"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="painel.js?v=70"></script>

</body>
</html>
