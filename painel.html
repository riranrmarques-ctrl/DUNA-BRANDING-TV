<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel - Duna Branding</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="painel.css?v=1">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<!-- TOPO -->
<div class="topo-fixo novo-topo">
  <div class="topo-esquerda">
    <a href="centralpainel.html" class="btn-voltar-central">← Voltar</a>
  </div>

  <div class="topo-centro">
    <h1>Gerenciador de Pontos</h1>
    <p>Gerencie seus pontos e playlists</p>
  </div>

  <div class="topo-direita">
    <img src="logo.png?v=2" class="logo-topo-img">
    <div class="status-topo">Painel Ativo</div>
  </div>
</div>

<!-- LISTA -->
<div id="listaPontos" class="grid-pontos"></div>

<!-- DETALHE -->
<div id="pontoDetalhe" style="display:none;">
  
  <div class="topbar-detalhe">
    <button id="btnVoltarLista">← Voltar</button>

    <div class="topbar-direita">
      <button id="btnDeletarPonto" class="btn-deletar-ponto">Deletar ponto</button>
      <div id="statusPonto" class="status-destaque"></div>
    </div>
  </div>

  <h2 id="nomePonto"></h2>
  <p id="enderecoPonto"></p>

  <div id="listaArquivos"></div>

</div>

<script src="painel.js?v=3"></script>

</body>
</html>
