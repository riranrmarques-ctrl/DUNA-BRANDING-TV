<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna TV | Painel</title>

  <link rel="stylesheet" href="painel.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- 🔐 LOGIN -->
<div id="loginBox" class="login-screen">
  <div class="login-card">
    <h2>Acesso ao Painel</h2>
    <input type="password" id="senhaInput" placeholder="Digite o código">
    <button id="btnLogin">Entrar</button>
    <p id="loginErro" class="login-erro"></p>
  </div>
</div>

<!-- 🧠 CONTEÚDO -->
<div id="conteudoPainel" style="display:none;">

  <!-- HEADER -->
  <header class="topbar">
    <div class="brand">Duna TV</div>
  </header>

  <main class="page">

    <!-- HERO -->
    <section class="hero">
      <h1>Painel de Pontos</h1>
      <p>Gerencie seus pontos e playlists.</p>
    </section>

    <!-- 📦 LISTA DE PONTOS -->
    <section id="listaPontos" class="pontos-box">

      <!-- CARD -->
      <div class="card-ponto" data-codigo="H4E9L2A">
        <div class="card-topo">
          <div class="card-nome">Carregando...</div>
          <button class="btn-editar-nome" data-codigo="H4E9L2A">✎</button>
        </div>

        <div class="card-codigo-linha">
          <div class="card-codigo">H4E9L2A</div>
          <button class="btn-copiar" data-codigo="H4E9L2A">⧉</button>
        </div>

        <button class="btn-abrir" data-codigo="H4E9L2A">Abrir pasta</button>
      </div>

      <!-- DUPLICA OS CARDS -->
      <div class="card-ponto" data-codigo="N7H3E8L">
        <div class="card-topo">
          <div class="card-nome">Carregando...</div>
          <button class="btn-editar-nome" data-codigo="N7H3E8L">✎</button>
        </div>
        <div class="card-codigo-linha">
          <div class="card-codigo">N7H3E8L</div>
          <button class="btn-copiar" data-codigo="N7H3E8L">⧉</button>
        </div>
        <button class="btn-abrir" data-codigo="N7H3E8L">Abrir pasta</button>
      </div>

    </section>

    <!-- 📁 DETALHE DA PASTA -->
    <section id="pontoDetalhe" style="display:none;">

      <div class="folder-header">
        <h2>Pasta do ponto <span id="codigoAtual"></span></h2>
        <p id="nomeAtual"></p>
      </div>

      <div class="folder-grid">

        <!-- ESQUERDA -->
        <div class="left-column">
          <div class="card">

            <h3>Adicionar mídia</h3>

            <input type="file" id="videoInput" accept=".mp4,.jpg,.jpeg,.png,.webp,.txt">

            <button id="btnUpload" class="btn btn-primary">Enviar mídia</button>

            <button id="btnVoltar" class="btn btn-secondary">Voltar</button>

          </div>
        </div>

        <!-- DIREITA -->
        <div class="right-column">
          <div class="card">

            <h3>Playlist</h3>

            <div id="playlistLista"></div>

          </div>
        </div>

      </div>

    </section>

  </main>

  <div id="status" class="status-box">Painel Ativo</div>

</div>

<script src="painel.js"></script>
</body>
</html>
