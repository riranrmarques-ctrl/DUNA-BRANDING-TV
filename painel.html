<!-- SUBSTITUA APENAS A PARTE DA PLAYLIST POR ESTA -->

<div id="pontoDetalhe" class="playlist-box" style="display:none;">

  <button id="btnVoltar" class="btn-voltar-topo">← Voltar</button>

  <div class="playlist-header">
    <h2 id="tituloPasta"></h2>

    <div class="codigo-linha">
      <span id="codigoAtual"></span>
      <button id="btnCopiarCodigo">⧉</button>
    </div>
  </div>

  <div class="playlist-grid-novo">

    <!-- ESQUERDA -->
    <div class="coluna-esquerda">
      <h3>Playlist ativa</h3>
      <div id="playlistAtiva" class="playlist-lista"></div>
    </div>

    <!-- DIREITA -->
    <div class="coluna-direita">

      <div class="upload-card">
        <h3>Adicionar mídia</h3>

        <input type="file" id="videoInput">
        <button id="btnUpload">Adicionar</button>

        <div class="upload-datas">
          <input type="date" id="dataInicio">
          <input type="date" id="dataFim">
        </div>
      </div>

      <div class="historico-box">
        <h3>Histórico de encerramento</h3>
        <div id="playlistInativa" class="historico-lista"></div>
      </div>

    </div>

  </div>
</div>
