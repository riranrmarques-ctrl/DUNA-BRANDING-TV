<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Duna Branding | Painel</title>
  <link rel="stylesheet" href="painel.css?v=100">
</head>

<body>

  <div id="conteudoPainel">

    <div class="topo-fixo novo-topo">
      <div class="topo-esquerda">
        <a href="centralpainel.html" class="btn-voltar-central">← Voltar</a>
      </div>

      <div class="topo-centro">
        <h1>Gerenciador de Pontos</h1>
        <p>Gerencie seus pontos e playlists.</p>
      </div>

      <div class="topo-direita">
        <img src="logo.png?v=2" class="logo-topo-img" alt="Duna TV">
        <div class="status-topo">Painel Ativo</div>
      </div>
    </div>

    <div class="painel-shell">
      <div id="listaPontos">

        <div class="pontos-box">
          <!-- OS CARDS CONTINUAM IGUAIS (NÃO MEXI) -->
        </div>

        <div class="novo-ponto-area">
          <button id="btnNovoPonto" class="btn-novo-ponto" type="button">+ Novo ponto</button>
        </div>

        <div class="assinatura-duna">
          Desenvolvido por <strong>Duna Branding</strong>
        </div>
      </div>

      <div id="pontoDetalhe" class="playlist-box" style="display:none;">

        <div class="playlist-topbar playlist-topbar-novo">
          <div class="topbar-esquerda">
            <button id="btnVoltar" type="button" class="btn-secundario btn-voltar-topo">← Voltar</button>
            <span class="topbar-titulo">Gerencie e organize a sua playlist</span>
          </div>

          <div class="topbar-direita">
            <button id="btnDeletarPonto" class="btn-deletar-ponto">Deletar ponto</button>
            <div id="statusPonto" class="status-destaque"></div>
          </div>
        </div>

        <div class="playlist-header playlist-header-novo">
          <div class="playlist-topo-flex">
            <div class="playlist-imagem-box">
              <img id="imagemPonto" src="https://placehold.co/600x320/png" alt="Imagem do ponto">
            </div>

            <div class="playlist-header-textos">
              <h2 id="tituloPasta"></h2>

              <div class="playlist-info-extra">
                <div id="cidadePonto" class="playlist-info-item"></div>
                <div id="enderecoPonto" class="playlist-info-item"></div>
              </div>

              <div class="playlist-codigo-linha">
                <button id="btnToggleDisponibilidade" class="toggle-ponto ativo" type="button">
                  <span class="toggle-bolinha"></span>
                  <span class="toggle-texto">Disponível</span>
                </button>

                <span id="codigoAtual"></span>
              </div>

              <div class="playlist-acoes-topo">
                <button id="btnEditarInfo" type="button" class="btn-secundario">Editar informações</button>
                <button id="btnUpgradePlaylist" type="button" class="btn-upgrade-playlist">upgrade</button>
                <input id="inputUpgradePlaylist" type="file" hidden>
              </div>
            </div>
          </div>
        </div>

        <div class="playlist-layout-novo">
          <div class="playlist-coluna-ativa">
            <div class="playlist-secao playlist-secao-ativa">
              <div class="playlist-secao-topo">
                <h4>Playlist ativa</h4>
              </div>

              <div id="playlistAtiva" class="playlist-lista"></div>
            </div>
          </div>

          <div class="playlist-coluna-historico">
            <div class="playlist-secao">
              <div class="playlist-secao-topo">
                <h4>Histórico de encerramento</h4>
              </div>
              <div id="historicoEncerramento" class="historico-lista"></div>
            </div>

            <div class="playlist-secao">
              <div class="playlist-secao-topo">
                <h4>Histórico de status</h4>
              </div>
              <div id="historicoStatus" class="historico-lista"></div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div id="modalEditar" class="modal-editar" style="display:none;">
      <div class="modal-conteudo">
        <h3>Editar Informações</h3>

        <input type="text" id="editNome">
        <input type="text" id="editCidade">
        <input type="text" id="editEndereco">

        <div class="edit-imagem-box">
          <img id="previewImagem">
          <input type="file" id="inputImagem">
        </div>

        <div class="edit-botoes">
          <button id="btnSalvarEdicao">Salvar</button>
          <button id="btnFecharModal">Cancelar</button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="painel.js?v=120"></script>
</body>
</html>
