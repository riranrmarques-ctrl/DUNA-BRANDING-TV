<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna Branding | Painel</title>
  <link rel="stylesheet" href="painel.css?v=31">
</head>
<body>

  <div class="logo-top">
    <img src="logo.png" alt="Duna TV">
  </div>

  <div class="page-title">
    <h1>Painel de Pontos</h1>
    <p>Gerencie seus pontos e playlists.</p>
  </div>

  <div class="painel-box">
    <div id="status" class="status-box">Painel pronto.</div>
  </div>

  <div id="listaPontos" class="pontos-box">
    <div class="card-ponto" data-codigo="0001">
      <div class="card-codigo">0001</div>

      <div class="card-nome-linha">
        <div class="card-nome">Carregando...</div>
        <button class="btn-editar-nome" data-codigo="0001" title="Renomear ponto" type="button">✏️</button>
      </div>

      <div class="card-acoes">
        <button class="btn-copiar" data-codigo="0001" type="button">Copiar código</button>
        <button class="btn-abrir" data-codigo="0001" type="button">Abrir pasta</button>
      </div>
    </div>

    <div class="card-ponto" data-codigo="0002">
      <div class="card-codigo">0002</div>

      <div class="card-nome-linha">
        <div class="card-nome">Carregando...</div>
        <button class="btn-editar-nome" data-codigo="0002" title="Renomear ponto" type="button">✏️</button>
      </div>

      <div class="card-acoes">
        <button class="btn-copiar" data-codigo="0002" type="button">Copiar código</button>
        <button class="btn-abrir" data-codigo="0002" type="button">Abrir pasta</button>
      </div>
    </div>

    <div class="card-ponto" data-codigo="0003">
      <div class="card-codigo">0003</div>

      <div class="card-nome-linha">
        <div class="card-nome">Carregando...</div>
        <button class="btn-editar-nome" data-codigo="0003" title="Renomear ponto" type="button">✏️</button>
      </div>

      <div class="card-acoes">
        <button class="btn-copiar" data-codigo="0003" type="button">Copiar código</button>
        <button class="btn-abrir" data-codigo="0003" type="button">Abrir pasta</button>
      </div>
    </div>

    <div class="card-ponto" data-codigo="0004">
      <div class="card-codigo">0004</div>

      <div class="card-nome-linha">
        <div class="card-nome">Carregando...</div>
        <button class="btn-editar-nome" data-codigo="0004" title="Renomear ponto" type="button">✏️</button>
      </div>

      <div class="card-acoes">
        <button class="btn-copiar" data-codigo="0004" type="button">Copiar código</button>
        <button class="btn-abrir" data-codigo="0004" type="button">Abrir pasta</button>
      </div>
    </div>

    <div class="card-ponto" data-codigo="0005">
      <div class="card-codigo">0005</div>

      <div class="card-nome-linha">
        <div class="card-nome">Carregando...</div>
        <button class="btn-editar-nome" data-codigo="0005" title="Renomear ponto" type="button">✏️</button>
      </div>

      <div class="card-acoes">
        <button class="btn-copiar" data-codigo="0005" type="button">Copiar código</button>
        <button class="btn-abrir" data-codigo="0005" type="button">Abrir pasta</button>
      </div>
    </div>
  </div>

  <div id="pontoDetalhe" class="playlist-box" style="display:none;">
    <div class="playlist-header">
      <h2>Pasta do ponto <span id="codigoAtual">0001</span></h2>
      <p id="nomeAtual">Nome do ponto</p>
    </div>

    <div class="painel-topo">
      <div class="campo">
        <label for="videoInput">Escolha o vídeo</label>
        <input type="file" id="videoInput" accept="video/*">
      </div>

      <div class="campo campo-botao">
        <label>&nbsp;</label>
        <button id="btnUpload" type="button">Enviar vídeo</button>
      </div>

      <div class="campo campo-botao">
        <label>&nbsp;</label>
        <button id="btnVoltar" type="button">Voltar</button>
      </div>
    </div>

    <div id="playlistLista" class="playlist-lista">
      <div class="playlist-item">
        <div class="playlist-item-topo">
          <strong>Nenhum vídeo carregado.</strong>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="painel.js?v=31"></script>
</body>
</html>
