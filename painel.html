<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Duna TV</title>
  <link rel="stylesheet" href="painel.css?v=50">
</head>
<body>

<!-- LOGIN -->
<div id="loginBox" class="login-box">
  <h2>Acesso ao Painel</h2>
  <input type="password" id="senhaInput" placeholder="Código de acesso">
  <button id="btnLogin">Entrar</button>
  <p id="loginErro"></p>
</div>

<!-- CONTEÚDO -->
<div id="conteudoPainel" style="display:none;">

  <div class="logo-top">
    <img src="logo.png">
  </div>

  <div class="page-title">
    <h1>Painel de Pontos</h1>
    <p>Gerencie seus pontos e playlists</p>
  </div>

  <div id="status" class="status-box">Painel Ativo</div>

  <div id="listaPontos" class="pontos-box">

    <!-- 8 CARDS -->
    <script>
      const CODIGOS = [
        "H4E9L2A","N7H3E8L","E2A6H9N","L8E1N5A",
        "H6N4E7A","A9L3E2H","E5H8A1N","N2E7L4A"
      ];

      document.write(CODIGOS.map(c => `
        <div class="card-ponto" data-codigo="${c}">
          <div class="card-nome-topo">
            <span class="card-nome">Carregando...</span>
            <button class="btn-editar-nome" data-codigo="${c}">✏</button>
          </div>

          <div class="card-codigo-linha">
            <span class="card-codigo">${c}</span>
            <button class="btn-copiar" data-codigo="${c}">📋</button>
          </div>

          <button class="btn-abrir" data-codigo="${c}">Abrir pasta</button>
        </div>
      `).join(""));
    </script>

  </div>

  <!-- PLAYLIST -->
  <div id="pontoDetalhe" class="playlist-box" style="display:none;">
    <h2>Pasta <span id="codigoAtual"></span></h2>
    <p id="nomeAtual"></p>

    <div class="painel-topo">
      <input type="file" id="videoInput" accept="video/*">
      <button id="btnUpload">Enviar</button>
      <button id="btnVoltar">Voltar</button>
    </div>

    <div id="playlistLista"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="painel.js?v=50"></script>

</body>
</html>
