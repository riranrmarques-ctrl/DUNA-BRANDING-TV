<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna Branding | Painel</title>
  <link rel="stylesheet" href="painel.css?v=30">
</head>
<body>

  <div class="logo-top">
    <img src="logo.png" alt="Duna TV">
  </div>

  <div class="page-title">
    <h1>Painel de Pontos</h1>
    <p>Gerencie seus pontos e playlists.</p>
  </div>

  <div class="painel-box">
    <div id="status" class="status-box">Painel pronto.</div>
  </div>

  <div id="listaPontos" class="pontos-box">
    <div class="card-ponto" data-codigo="0001"><div class="card-codigo">0001</div><div class="card-nome">...</div><div class="card-acoes"><button class="btn-copiar" data-codigo="0001">Copiar</button><button class="btn-abrir" data-codigo="0001">Abrir</button></div></div>
    <div class="card-ponto" data-codigo="0002"><div class="card-codigo">0002</div><div class="card-nome">...</div><div class="card-acoes"><button class="btn-copiar" data-codigo="0002">Copiar</button><button class="btn-abrir" data-codigo="0002">Abrir</button></div></div>
    <div class="card-ponto" data-codigo="0003"><div class="card-codigo">0003</div><div class="card-nome">...</div><div class="card-acoes"><button class="btn-copiar" data-codigo="0003">Copiar</button><button class="btn-abrir" data-codigo="0003">Abrir</button></div></div>
    <div class="card-ponto" data-codigo="0004"><div class="card-codigo">0004</div><div class="card-nome">...</div><div class="card-acoes"><button class="btn-copiar" data-codigo="0004">Copiar</button><button class="btn-abrir" data-codigo="0004">Abrir</button></div></div>
    <div class="card-ponto" data-codigo="0005"><div class="card-codigo">0005</div><div class="card-nome">...</div><div class="card-acoes"><button class="btn-copiar" data-codigo="0005">Copiar</button><button class="btn-abrir" data-codigo="0005">Abrir</button></div></div>
  </div>

  <div id="pontoDetalhe" class="playlist-box" style="display:none;">
    <h2>Ponto <span id="codigoAtual"></span></h2>

    <div class="campo">
      <label>Nome do ponto</label>
      <input type="text" id="inputNomePonto">
      <button id="btnSalvarNome">Salvar nome</button>
    </div>

    <div class="painel-topo">
      <input type="file" id="videoInput">
      <button id="btnUpload">Enviar vídeo</button>
      <button id="btnVoltar">Voltar</button>
    </div>

    <div id="playlistLista"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="painel.js?v=30"></script>
</body>
</html>
