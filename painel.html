<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna Branding | Painel</title>
  <link rel="stylesheet" href="painel.css">
</head>
<body>

  <div class="logo-top">
    <img src="logo.png" alt="Duna TV">
  </div>

  <div class="page-title">
    <h1>Painel de Pastas Fixas</h1>
    <p>Gerencie os estabelecimentos com códigos fixos e playlists por link.</p>
  </div>

  <div class="grid" id="cardsContainer"></div>

  <div class="json-box">
    <div class="json-header">
      <h2>clientes.json</h2>
      <div class="json-actions">
        <button onclick="formatarJson()">Formatar</button>
        <button onclick="copiarJson()">Copiar</button>
      </div>
    </div>

    <textarea id="jsonOutput" readonly></textarea>

    <p class="json-note">
      Copie este conteúdo e atualize seu arquivo <strong>clientes.json</strong> no GitHub para refletir na TV.
    </p>
  </div>

  <script src="painel.js"></script>
</body>
</html>
