<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUNA Branding</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="center-box">
    <div class="card">
      <h1>DUNA Branding</h1>
      <p>Digite o código para abrir o player.</p>
      <form id="codeForm">
        <input id="codigo" type="text" placeholder="Ex.: abc123" required>
        <button type="submit">Entrar</button>
      </form>
      <p id="mensagem" class="mensagem"></p>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
