<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUNA Branding</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="center-box">
    <div class="card intro-card">

      <div class="brand-title">
        <span class="duna">DUNA</span>
        <span class="branding">Branding</span>
      </div>

      <h1>Acesso do ponto</h1>
      <p class="intro-text">Digite o código do estabelecimento para abrir a reprodução.</p>

      <form id="codeForm" class="code-form">
        <input id="codigo" type="text" placeholder="Digite o código do ponto" autocomplete="off" required>
        <button type="submit">Entrar</button>
      </form>

      <p id="mensagem" class="mensagem"></p>
      <p id="contadorTexto" class="contador-texto hidden"></p>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
