<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Central Clientes</title>

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script>
    if (sessionStorage.getItem("painelLiberado") !== "1") {
      window.location.replace("/painel.html");
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f1115;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .topo-esquerda h1 {
      font-size: clamp(2.1rem, 3.5vw, 3rem);
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 6px;
      font-weight: 800;
    }

    .topo-esquerda p {
      color: #bfc7d5;
      font-size: clamp(1rem, 1.4vw, 1.35rem);
      line-height: 1.2;
      margin-top: 0;
    }

    .acoes-topo {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .botao {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s ease;
      color: #fff;
    }

    .botao-voltar { background: #2a2f3a; }
    .botao-atualizar { background: #f59e0b; color: #111827; font-weight: bold; }
    .botao-novo { background: #2d8cff; font-weight: bold; }

    .barra { margin-bottom: 8px; }

    .campo-busca input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #313847;
      background: #171a21;
      color: #fff;
      outline: none;
      font-size: 1rem;
    }

    .filtros-organizacao {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin: 8px 0 16px;
    }

    /* 🔥 AQUI FOI AJUSTADO */

    .filtro-btn {
      height: 32px;
      border-radius: 10px;
      padding: 0 12px;

      background: #60a5fa;
      color: #0b1220;

      font-size: 0.78rem;
      font-weight: 700;

      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .filtro-btn:hover {
      filter: brightness(1.05);
    }

    .filtro-btn.ativo {
      background: #2d8cff;
      color: #ffffff;
      box-shadow: 0 6px 18px rgba(45, 140, 255, 0.35);
      transform: translateY(-1px);
    }

    /* resto intacto */

    .mensagem {
      min-height: 24px;
      color: #9fd2ff;
      font-size: 0.95rem;
      margin-bottom: 14px;
    }

    .lista-clientes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .cliente-card {
      background: #171a21;
      border: 2px solid #262b36;
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
    }

    .cliente-card.ativo { background: #14532d; }
    .cliente-card.nao-ativo { background: #4b1f24; }
    .cliente-card.supervisor { background: #5a3a00; }

  </style>
</head>

<body>
  <div class="container">
    <div class="topo">
      <div class="topo-esquerda">
        <h1>Central Clientes</h1>
        <p>Gerencie clientes e seus acessos.</p>
      </div>

      <div class="acoes-topo">
        <button id="botaoVoltarPainel" class="botao botao-voltar">Voltar ao Painel</button>
        <button id="botaoNovoCliente" class="botao botao-novo">+ Novo cliente</button>
        <button id="botaoAtualizar" class="botao botao-atualizar">Atualizar</button>
      </div>
    </div>

    <div class="barra">
      <div class="campo-busca">
        <input type="text" id="buscaCliente" placeholder="Buscar por código, nome ou telefone">
      </div>
    </div>

    <div class="filtros-organizacao">
      <button class="filtro-btn" data-filtro="status">Status</button>
      <button class="filtro-btn" data-filtro="nome">Nome</button>
      <button class="filtro-btn" data-filtro="data">Data</button>
      <button class="filtro-btn" data-filtro="personalizado">Personalizado</button>
    </div>

    <p id="mensagem">Carregando clientes...</p>

    <div id="listaClientes" class="lista-clientes"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="central-clientes.js?v=1"></script>
</body>
</html>
