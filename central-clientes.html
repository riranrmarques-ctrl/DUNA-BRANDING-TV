<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>Central Clientes</title>

  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <script>
    if (sessionStorage.getItem("painelLiberado") !== "1") {
      window.location.replace("/painel.html");
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f1115;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .topo-esquerda h1 {
      font-size: 42px;
      line-height: 1;
      margin-bottom: 6px;
      font-weight: 800;
    }

    .topo-esquerda p {
      color: #bfc7d5;
      font-size: 16px;
      line-height: 1.2;
    }

    .acoes-topo {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .botao {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s ease;
      color: #fff;
    }

    .botao:hover {
      opacity: 0.92;
    }

    .botao-voltar { background: #2a2f3a; }
    .botao-atualizar { background: #f59e0b; color: #111827; font-weight: bold; }
    .botao-novo { background: #2d8cff; font-weight: bold; }

    .barra { margin-bottom: 8px; }

    .campo-busca input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #313847;
      background: #171a21;
      color: #fff;
      outline: none;
      font-size: 1rem;
    }

    .filtros-organizacao {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
      margin: 8px 0 16px;
    }

    .filtro-btn {
      height: 28px;
      border: 1px solid #2a3040;
      border-radius: 8px;
      background: #121722;
      color: #aeb8cc;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
    }

    .lista-clientes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .cliente-card {
      border-radius: 16px;
      padding: 16px;
      border: 2px solid transparent;
      transition: all 0.25s ease;
      cursor: pointer;
    }

    /* STATUS BASE */

    .cliente-card.ativo {
      background: #14532d;
      border-color: #22c55e;
    }

    .cliente-card.nao-ativo {
      background: #5a1a1a;
      border-color: #ef4444;
    }

    .cliente-card.supervisor {
      background: #5a3a00;
      border-color: #f59e0b;
    }

    /* SELECIONADO */

    .cliente-card.selecionado {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      border-color: #ffffff;
      filter: brightness(1.2);
    }

    .cliente-topo {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .cliente-codigo {
      font-size: 0.8rem;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .cliente-status {
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 800;
    }

    .cliente-status.ativo { background: #22c55e; color: #022c22; }
    .cliente-status.nao-ativo { background: #ef4444; }
    .cliente-status.supervisor { background: #f59e0b; color: #000; }

    .cliente-card h3 {
      font-size: 1.05rem;
      margin-bottom: 4px;
    }

    .cliente-card p {
      color: #c6cedd;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="topo">
      <div class="topo-esquerda">
        <h1>Central Clientes</h1>
        <p>Gerencie clientes e seus acessos.</p>
      </div>

      <div class="acoes-topo">
        <button id="botaoVoltarPainel" class="botao botao-voltar">Voltar ao Painel</button>
        <button id="botaoNovoCliente" class="botao botao-novo">+ Novo cliente</button>
        <button id="botaoAtualizar" class="botao botao-atualizar">Atualizar</button>
      </div>
    </div>

    <div class="barra">
      <div class="campo-busca">
        <input type="text" placeholder="Buscar por código, nome ou telefone">
      </div>
    </div>

    <div id="listaClientes" class="lista-clientes"></div>
  </div>

  <script>
    document.addEventListener("click", (e) => {
      const card = e.target.closest(".cliente-card");
      if (!card) return;

      document.querySelectorAll(".cliente-card").forEach(c => {
        c.classList.remove("selecionado");
      });

      card.classList.add("selecionado");
    });
  </script>

</body>
</html>
