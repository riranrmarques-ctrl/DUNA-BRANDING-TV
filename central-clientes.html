<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central Clientes</title>

  <script>
    if (sessionStorage.getItem("painelLiberado") !== "1") {
      window.location.replace("/painel.html");
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f1115;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .topo-esquerda h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .topo-esquerda p {
      color: #bfc7d5;
      line-height: 1.5;
    }

    .acoes-topo {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .botao {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s ease;
      color: #fff;
    }

    .botao:hover {
      opacity: 0.92;
    }

    .botao-voltar,
    .botao-atualizar {
      background: #2a2f3a;
    }

    .botao-novo {
      background: #2d8cff;
      font-weight: bold;
    }

    .barra {
      margin-bottom: 18px;
    }

    .campo-busca input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #313847;
      background: #171a21;
      color: #fff;
      outline: none;
      font-size: 1rem;
    }

    .campo-busca input::placeholder {
      color: rgba(255, 255, 255, 0.45);
    }

    .mensagem {
      min-height: 24px;
      color: #9fd2ff;
      font-size: 0.95rem;
      margin-bottom: 14px;
    }

    .lista-clientes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .cliente-card {
      background: #171a21;
      border: 1px solid #262b36;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
      transition: 0.2s ease;
      cursor: pointer;
    }

    .cliente-card:hover {
      border-color: #2d8cff;
      transform: translateY(-2px);
    }

    .cliente-codigo {
      display: inline-block;
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 999px;
      background: #10131a;
      border: 1px solid #2a3040;
      color: #9fd2ff;
      margin-bottom: 12px;
    }

    .cliente-card h3 {
      font-size: 1.08rem;
      margin-bottom: 10px;
    }

    .cliente-card p {
      color: #c6cedd;
      font-size: 0.93rem;
      line-height: 1.5;
      margin-bottom: 5px;
    }

    .cliente-acoes {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .cliente-acoes button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      color: #fff;
      font-size: 0.9rem;
    }

    .botao-abrir {
      background: #2d8cff;
    }

    .botao-excluir {
      background: #d9534f;
    }

    .vazio {
      background: #171a21;
      border: 1px solid #262b36;
      border-radius: 16px;
      padding: 24px;
      color: #c6cedd;
      text-align: center;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .topo-esquerda h1 {
        font-size: 1.6rem;
      }

      .acoes-topo {
        width: 100%;
      }

      .botao {
        flex: 1;
        min-width: 140px;
      }

      .cliente-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topo">
      <div class="topo-esquerda">
        <h1>Central Clientes</h1>
        <p>Gerencie clientes e seus acessos.</p>
      </div>

      <div class="acoes-topo">
        <button id="botaoVoltarPainel" class="botao botao-voltar" type="button">Voltar ao Painel</button>
        <button id="botaoNovoCliente" class="botao botao-novo" type="button">+ Novo cliente</button>
        <button id="botaoAtualizar" class="botao botao-atualizar" type="button">Atualizar</button>
      </div>
    </div>

    <div class="barra">
      <div class="campo-busca">
        <input type="text" id="buscaCliente" placeholder="Buscar por código, nome, empresa ou telefone">
      </div>
    </div>

    <p id="mensagem" class="mensagem">Carregando clientes...</p>

    <div id="listaClientes" class="lista-clientes"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="central-clientes.js?v=511"></script>
</body>
</html>
