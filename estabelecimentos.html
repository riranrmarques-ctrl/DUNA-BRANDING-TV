<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Contrato - Estabelecimento</title>

<style>
body { font-family: Arial; background:#fff; padding:30px; }
h1 { margin-bottom:20px; }

.campo { margin-bottom:10px; }
.campo strong { display:block; }

.btn {
  margin-top:20px;
  padding:10px 20px;
  background:#000;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Contrato de Parceria</h1>

<div class="campo"><strong>Estabelecimento:</strong> <span id="nomeLocal">[LOCAL]</span></div>

<hr>

<p><strong>OBJETO:</strong> Instalação de telas para publicidade.</p>
<p><strong>RESPONSABILIDADE:</strong> DUNA é responsável pela operação e manutenção.</p>
<p><strong>USO:</strong> O local autoriza a exibição de anúncios.</p>

<button class="btn" onclick="window.print()">Imprimir</button>

<script>

function getAmbiente(){
  return JSON.parse(localStorage.getItem('ambienteSelecionado')) ||
         JSON.parse(localStorage.getItem('ambiente')) || null;
}

const ambiente = getAmbiente();

if(ambiente){
  document.getElementById('nomeLocal').innerText = ambiente.nome || '[LOCAL]';
}

</script>

</body>
</html>
