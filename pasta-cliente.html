<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasta do Cliente</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #0f1115; color: #ffffff; min-height: 100vh; padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .topo { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .topo h1 { font-size: 2rem; margin-bottom: 8px; }
    .topo p { color: #bfc7d5; line-height: 1.5; }
    .acoes-topo { display: flex; gap: 10px; flex-wrap: wrap; }
    .botao { border: none; border-radius: 12px; padding: 12px 18px; font-size: 0.95rem; cursor: pointer; color: #fff; }
    .botao-voltar { background: #2a2f3a; }
    .botao-salvar { background: #2d8cff; font-weight: bold; }

    .grid { display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
    .box { background: #171a21; border: 1px solid #262b36; border-radius: 16px; padding: 20px; }
    .box h2 { margin-bottom: 16px; }

    .campo { margin-bottom: 16px; }
    .campo label { display: block; margin-bottom: 8px; }

    .campo input, .campo textarea, .campo select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #313847;
      background: #0f1115;
      color: #fff;
    }

    .linha-dupla { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .linha-tripla { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

    .status-badge {
      display: flex;
      align-items: center;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #313847;
      background: #0f1115;
    }

    .upload-box {
      border: 1px dashed #2d8cff;
      border-radius: 12px;
      padding: 16px;
    }

    .pdf-box {
      border: 1px dashed #2d8cff;
      border-radius: 12px;
      padding: 16px;
    }

    .pontos-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }

    .item-ponto {
      background: #10131a;
      border: 1px solid #2a3040;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      gap: 10px;
    }

    .mensagem { margin-bottom: 10px; }
    .resumo { background: #10131a; padding: 16px; border-radius: 12px; margin-bottom: 16px; }
  </style>
</head>
<body>

<div class="container">

  <div class="topo">
    <div>
      <h1>Pasta do Cliente</h1>
      <p>Edite os dados do cliente e visualize os pontos das telas.</p>
    </div>

    <div class="acoes-topo">
      <button id="botaoVoltar" class="botao botao-voltar">Voltar</button>
      <button id="botaoSalvar" class="botao botao-salvar">Salvar</button>
    </div>
  </div>

  <p id="mensagem" class="mensagem"></p>

  <div class="grid">

    <div class="box">
      <h2>Dados do cliente</h2>

      <div class="linha-tripla">
        <input id="codigo" readonly>
        <div id="statusCliente" class="status-badge">Não ativo</div>
        <input type="date" id="vencimentoExibicao">
      </div>

      <div class="linha-dupla">
        <input id="nome">
        <input id="telefone">
      </div>

      <select id="segmento"></select>
      <textarea id="observacao"></textarea>

      <!-- 🔥 NOVO UPGRADE -->
      <div class="campo">
        <label>Upgrade de arquivo</label>

        <div class="upload-box">

          <input type="file" id="arquivoInput" accept=".mp4,.jpg,.txt">

          <button id="btnUploadCliente" class="botao botao-salvar" style="margin-top:10px;">
            Enviar
          </button>

          <div id="statusUpload" style="margin-top:10px;"></div>

        </div>
      </div>

    </div>

    <div class="box">
      <h2>Informações</h2>
      <div id="resumoCliente" class="resumo"></div>

      <div class="campo">
        <label>Contrato</label>
        <div class="pdf-box">
          Espaço para contrato
        </div>
      </div>
    </div>

  </div>

  <div class="box" style="margin-top:20px;">
    <h2>PONTOS DAS TELAS</h2>
    <div id="listaPontos" class="pontos-grid"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="pasta-cliente.js?v=3"></script>

</body>
</html>
