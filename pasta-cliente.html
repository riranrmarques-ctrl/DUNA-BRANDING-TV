<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasta do Cliente</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial; }

body {
  background: #0f1115;
  color: #fff;
  padding: 20px;
}

.container { max-width: 1100px; margin: auto; }

.grid {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 20px;
}

.box {
  background: #171a21;
  border: 1px solid #262b36;
  border-radius: 16px;
  padding: 20px;
}

.campo { margin-bottom: 16px; }

.campo input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #313847;
  background: #0f1115;
  color: #fff;
}

.pontos-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* NOVO DESIGN */
.item-ponto {
  background: #10131a;
  border: 1px solid #2a3040;
  border-radius: 14px;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: 0.25s;
}

.item-ponto:hover {
  border-color: #2d8cff;
}

.item-ponto.selecionado {
  border-color: #2d8cff;
  background: rgba(45,140,255,0.08);
}

.ponto-esquerda {
  display: flex;
  align-items: center;
  gap: 12px;
}

.ponto-checkbox {
  width: 20px;
  height: 20px;
}

.ponto-info {
  display: flex;
  flex-direction: column;
}

.ponto-nome { font-size: 14px; }
.ponto-codigo { font-size: 12px; color: #9aa4b2; }

.botao {
  background: #2d8cff;
  border: none;
  padding: 12px 18px;
  border-radius: 10px;
  color: #fff;
  cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Pasta do Cliente</h2>
<p>Edite os dados do cliente e escolha os pontos de exibição.</p>

<button id="botaoSalvar" class="botao">Salvar</button>

<div class="grid">

<div class="box">

<div class="campo">
<input id="nome" placeholder="Nome completo">
</div>

<div class="campo">
<input id="telefone" placeholder="Telefone">
</div>

<div class="campo">
<input id="email" placeholder="Email">
</div>

<div class="campo">
<input id="cpfCnpj" placeholder="CPF / CNPJ">
</div>

<div class="campo">
<label>PONTOS</label>
<div id="listaPontos" class="pontos-grid"></div>
</div>

</div>

<div class="box">
<div id="resumoCliente"></div>
</div>

</div>

</div>

<script src="pasta-cliente.js?v=99"></script>
</body>
</html>
