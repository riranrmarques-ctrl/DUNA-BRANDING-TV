<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasta do Cliente</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f1115;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .topo h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .topo p {
      color: #bfc7d5;
      line-height: 1.5;
    }

    .acoes-topo {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .botao {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s ease;
      color: #fff;
    }

    .botao:hover {
      opacity: 0.92;
    }

    .botao-voltar {
      background: #2a2f3a;
    }

    .botao-salvar {
      background: #2d8cff;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
    }

    .box {
      background: #171a21;
      border: 1px solid #262b36;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }

    .box h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
    }

    .campo {
      margin-bottom: 16px;
    }

    .campo label {
      display: block;
      margin-bottom: 8px;
      color: #d5dbea;
      font-size: 0.95rem;
    }

    .campo input,
    .campo textarea,
    .campo select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #313847;
      background: #0f1115;
      color: #fff;
      outline: none;
      font-size: 1rem;
    }

    .campo textarea {
      resize: vertical;
      min-height: 90px;
    }

    .linha-dupla {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .linha-tripla {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      min-height: 46px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #313847;
      background: #0f1115;
      color: #ffffff;
      font-size: 1rem;
      width: 100%;
    }

    .pdf-box {
      background: #10131a;
      border: 1px dashed #2d8cff;
      border-radius: 14px;
      padding: 18px;
      color: #c6cedd;
      line-height: 1.6;
      min-height: 150px;
    }

    .pdf-box strong {
      display: block;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .upload-box {
      background: #10131a;
      border: 1px dashed #2d8cff;
      border-radius: 14px;
      padding: 18px;
      color: #c6cedd;
      line-height: 1.6;
      min-height: 150px;
    }

    .upload-box strong {
      display: block;
      color: #ffffff;
      margin-bottom: 8px;
    }

    .pontos-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .item-ponto {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: #10131a;
      border: 1px solid #2a3040;
      border-radius: 10px;
      padding: 14px;
      min-height: 92px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .item-ponto:hover {
      border-color: #3f4a63;
      transform: translateY(-1px);
    }

    .item-ponto input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #2d8cff;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .item-ponto-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .item-ponto-info strong {
      font-size: 0.95rem;
      color: #fff;
      line-height: 1.4;
    }

    .item-ponto-info span {
      color: #bfc7d5;
      font-size: 0.88rem;
      line-height: 1.4;
    }

    .mensagem {
      min-height: 24px;
      color: #9fd2ff;
      font-size: 0.95rem;
      margin-top: 10px;
      margin-bottom: 12px;
    }

    .resumo {
      background: #10131a;
      border: 1px solid #2a3040;
      border-radius: 14px;
      padding: 16px;
      line-height: 1.6;
      color: #c6cedd;
      margin-bottom: 16px;
    }

    .resumo .linha {
      margin-bottom: 8px;
    }

    .vazio {
      color: #c6cedd;
      background: #10131a;
      border: 1px solid #2a3040;
      border-radius: 12px;
      padding: 16px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .linha-dupla,
      .linha-tripla,
      .pontos-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .topo h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topo">
      <div>
        <h1>Pasta do Cliente</h1>
        <p>Edite os dados do cliente e visualize os pontos das telas.</p>
      </div>

      <div class="acoes-topo">
        <button id="botaoVoltar" class="botao botao-voltar" type="button">Voltar</button>
        <button id="botaoSalvar" class="botao botao-salvar" type="button">Salvar</button>
      </div>
    </div>

    <p id="mensagem" class="mensagem"></p>

    <div class="grid">
      <div class="box">
        <h2>Dados do cliente</h2>

        <div class="linha-tripla">
          <div class="campo">
            <label for="codigo">Código</label>
            <input type="text" id="codigo" readonly>
          </div>

          <div class="campo">
            <label for="statusCliente">Status do cliente</label>
            <div id="statusCliente" class="status-badge">Não ativo</div>
          </div>

          <div class="campo">
            <label for="vencimentoExibicao">Vencimento da exibição</label>
            <input type="date" id="vencimentoExibicao">
          </div>
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Nome do cliente">
          </div>

          <div class="campo">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="(00) 0000-0000" maxlength="14">
          </div>
        </div>

        <div class="campo">
          <label for="segmento">Segmento</label>
          <select id="segmento">
            <option value="">Selecionar segmento</option>
          </select>
        </div>

        <div class="campo">
          <label for="observacao">Observação</label>
          <textarea id="observacao" placeholder="Observações do cliente"></textarea>
        </div>

        <div class="campo">
          <label>Upgrade de arquivo</label>
          <div class="upload-box">
            <strong>Espaço de upgrade de arquivo</strong>
            Aqui ficará a área de envio e upgrade do material do cliente.
          </div>
        </div>
      </div>

      <div class="box">
        <h2>Informações</h2>
        <div id="resumoCliente" class="resumo"></div>

        <div class="campo">
          <label>Contrato</label>
          <div class="pdf-box">
            <strong>Espaço para contrato</strong>
            Aqui ficará a área do contrato do cliente.
          </div>
        </div>
      </div>
    </div>

    <div class="box" style="margin-top: 20px;">
      <h2>PONTOS DAS TELAS</h2>
      <div id="listaPontos" class="pontos-grid"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pasta-cliente.js?v=2"></script>
</body>
</html>
