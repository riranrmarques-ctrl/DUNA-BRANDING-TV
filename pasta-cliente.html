<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasta do Cliente</title>

  <script>
    if (sessionStorage.getItem("painelLiberado") !== "1") {
      window.location.replace("/painel.html");
    }
  </script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f1115;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .topo h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .topo p {
      color: #bfc7d5;
      line-height: 1.5;
    }

    .acoes-topo {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .botao {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      color: #fff;
      transition: 0.2s ease;
    }

    .botao:hover {
      opacity: 0.92;
    }

    .botao-voltar {
      background: #2a2f3a;
    }

    .botao-salvar {
      background: #2d8cff;
      font-weight: bold;
    }

    .botao-excluir-cliente {
      background: #d9534f;
      font-weight: bold;
      padding: 9px 14px;
      font-size: 0.86rem;
      border-radius: 10px;
    }

    .botao-excluir-cliente:hover {
      background: #c2413d;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
    }

    .grid-historicos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .box {
      background: #171a21;
      border: 1px solid #262b36;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }

    .box h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
    }

    .campo {
      margin-bottom: 16px;
    }

    .campo label {
      display: block;
      margin-bottom: 8px;
      color: #d5dbea;
      font-size: 0.95rem;
    }

    .campo input,
    .campo textarea,
    .campo select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #313847;
      background: #0f1115;
      color: #fff;
      outline: none;
      font-size: 1rem;
    }

    .campo select {
      cursor: pointer;
      appearance: none;
      background-image:
        linear-gradient(45deg, transparent 50%, #9fd2ff 50%),
        linear-gradient(135deg, #9fd2ff 50%, transparent 50%);
      background-position:
        calc(100% - 18px) 50%,
        calc(100% - 12px) 50%;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .campo input[readonly] {
      opacity: 0.9;
      cursor: not-allowed;
    }

    .botao-supervisor {
      width: fit-content;
      min-width: 112px;
      height: 34px;
      border: 1px solid rgba(245, 158, 11, 0.65);
      border-radius: 999px;
      padding: 0 14px;
      background: rgba(245, 158, 11, 0.16);
      color: #fbbf24;
      font-size: 0.78rem;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .botao-supervisor.ativo {
      background: #f59e0b;
      border-color: #f59e0b;
      color: #111827;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.18);
    }

    .botao-supervisor:hover {
      transform: translateY(-1px);
    }

    .campo-upgrade select {
      border-color: rgba(124, 252, 154, 0.45);
      background-color: rgba(34, 197, 94, 0.1);
    }

    .linha-dupla {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .linha-tripla {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      min-height: 46px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #313847;
      background: #0f1115;
      color: #ffffff;
      font-size: 1rem;
    }

    .upload-box,
    .pdf-box {
      background: #10131a;
      border: 1px dashed #2d8cff;
      border-radius: 14px;
      padding: 16px;
    }

    .pdf-box {
      padding: 14px;
    }

    .upload-box {
      border-color: rgba(45, 140, 255, 0.65);
      background:
        linear-gradient(180deg, rgba(45, 140, 255, 0.09), rgba(16, 19, 26, 0.96)),
        #10131a;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .upload-box strong,
    .pdf-box strong {
      display: block;
      margin-bottom: 10px;
      color: #ffffff;
      font-size: 1rem;
    }

    .upload-acoes {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .upload-acoes input[type="file"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #313847;
      background: #0f1115;
      color: #fff;
      font-size: 0.95rem;
    }

    .upload-acoes .botao {
      width: fit-content;
    }

    .botao-upload-cheio {
      width: 100% !important;
      border-radius: 10px;
      padding: 13px 18px;
    }

    .status-upload {
      min-height: 20px;
      font-size: 0.92rem;
      color: #bfc7d5;
    }

    .mensagem {
      min-height: 24px;
      color: #9fd2ff;
      font-size: 0.95rem;
      margin-bottom: 12px;
    }

    .pontos-grid {
      background: #10131a;
      border: 1px dashed #2d8cff;
      border-radius: 14px;
      padding: 14px;
      max-height: 430px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .historico-lista {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 120px;
    }

    .historico-vazio {
      color: #c6cedd;
      background: #10131a;
      border: 1px solid #2a3040;
      border-radius: 12px;
      padding: 16px;
    }

    .vazio {
      color: #c6cedd;
      background: #10131a;
      border: 1px solid #2a3040;
      border-radius: 12px;
      padding: 16px;
    }

    .grid-pontos-grupo {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .toggle-contrato {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 100px;
      height: 42px;
      padding: 0 12px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .toggle-contrato.ativo {
      background: #3d9147;
      padding-right: 46px;
    }

    .toggle-contrato.desativado {
      background: #8a3c3c;
      padding-left: 46px;
    }

    .toggle-contrato .toggle-bola {
      position: absolute;
      top: 6px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.25);
      transition: 0.2s ease;
    }

    .toggle-contrato.ativo .toggle-bola {
      right: 6px;
    }

    .toggle-contrato.desativado .toggle-bola {
      left: 6px;
    }

    .toggle-contrato .toggle-texto {
      font-size: 0.86rem;
      line-height: 1;
      white-space: nowrap;
    }

    @media (max-width: 900px) {
      .grid,
      .grid-historicos,
      .linha-dupla,
      .linha-tripla {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .grid-pontos-grupo {
        grid-template-columns: 1fr !important;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .topo h1 {
        font-size: 1.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topo">
      <div>
        <h1>Pasta do Cliente</h1>
        <p>Edite os dados do cliente e escolha os pontos de exibição.</p>
      </div>

      <div class="acoes-topo">
        <button id="botaoExcluirCliente" class="botao botao-excluir-cliente" type="button">Apagar</button>
        <button id="botaoVoltar" class="botao botao-voltar" type="button">Voltar</button>
        <button id="botaoSalvar" class="botao botao-salvar" type="button">Salvar</button>
      </div>
    </div>

    <p id="mensagem" class="mensagem"></p>

    <div class="grid">
      <div class="box">
        <h2>Dados do cliente</h2>

        <div class="linha-tripla">
          <div class="campo">
            <label for="codigo">Código</label>
            <input id="codigo" type="text" readonly>
          </div>

          <div class="campo">
            <label for="statusCliente">Status do cliente</label>
            <div id="statusCliente" class="status-badge">Não ativo</div>
          </div>

          <div class="campo">
            <label for="dataPostagem">Data de postagem</label>
            <input type="date" id="dataPostagem">
          </div>
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label>Tipo de acesso</label>
            <button id="btnSupervisor" class="botao-supervisor" type="button">Supervisor</button>
            <input id="tipoAcessoCliente" type="hidden" value="cliente">
          </div>

          <div class="campo campo-upgrade">
            <label for="materialUpgradeAtivo">Material de upgrade</label>
            <select id="materialUpgradeAtivo">
              <option value="true">Ativado</option>
              <option value="false">Desativado</option>
            </select>
          </div>
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label for="valorContratado">Valor contratado</label>
            <input id="valorContratado" type="text" placeholder="R$ 0,00" inputmode="numeric">
          </div>

          <div class="campo">
            <label for="vencimentoExibicao">Vencimento da mídia</label>
            <input type="date" id="vencimentoExibicao" required>
          </div>
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label for="nome">Nome completo</label>
            <input id="nome" type="text" placeholder="Nome completo do cliente" required>
          </div>

          <div class="campo">
            <label for="telefone">Telefone</label>
            <input id="telefone" type="text" placeholder="(XX) XXXXX-XXXX" maxlength="15" required>
          </div>
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="email@exemplo.com" required>
          </div>

          <div class="campo">
            <label for="cpfCnpj">CPF / CNPJ</label>
            <input id="cpfCnpj" type="text" placeholder="CPF ou CNPJ" required>
          </div>
        </div>

        <div class="campo">
          <label>PONTOS DAS TELAS</label>
          <div id="listaPontos" class="pontos-grid"></div>
        </div>
      </div>

      <div class="box">
        <div class="campo">
          <div class="pdf-box">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
              <strong style="margin:0;">Contrato do cliente</strong>
              <span id="contratoStatus" style="font-size:0.82rem;color:#9fd2ff;">Carregando...</span>
            </div>

            <div
              id="contratoPreview"
              style="
                color:#d5dbea;
                font-size:0.9rem;
                line-height:1.55;
                max-height:520px;
                min-height:430px;
                overflow:auto;
                padding:12px;
                border:1px solid #2a3040;
                border-radius:10px;
                background:#0f1115;
                margin-bottom:12px;
              "
            ></div>

            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
              <button id="btnBaixarContrato" class="botao botao-salvar" type="button">
                gerar contrato
              </button>

              <button id="btnToggleContrato" class="toggle-contrato ativo" type="button" aria-pressed="true">
                <span class="toggle-bola"></span>
                <span class="toggle-texto">Ativado</span>
              </button>
            </div>
          </div>
        </div>

        <div class="campo" style="margin-top:28px;">
          <div class="upload-box">
            <strong>Espaço de upgrade de arquivo</strong>

            <div class="upload-acoes">
              <input type="file" id="arquivoInput" accept=".mp4,.jpg,.jpeg,.png,.webp,.txt">
              <button id="btnUploadCliente" class="botao botao-salvar botao-upload-cheio" type="button">Enviar</button>
              <div id="statusUpload" class="status-upload"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="grid-historicos">
      <div class="box">
        <h2>Histórico de contrato</h2>
        <div id="historicoContratos" class="historico-lista">
          <div class="historico-vazio">Nenhum contrato gerado ainda.</div>
        </div>
      </div>

      <div class="box">
        <h2>Histórico de arquivo</h2>
        <div id="historicoArquivos" class="historico-lista"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pasta-cliente.js?v=600"></script>
</body>
</html>
