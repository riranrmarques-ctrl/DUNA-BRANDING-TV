<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasta do Cliente</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f1115;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .topo h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .topo p {
      color: #bfc7d5;
      line-height: 1.5;
    }

    .acoes-topo {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .botao {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s ease;
      color: #fff;
    }

    .botao:hover {
      opacity: 0.92;
    }

    .botao-voltar {
      background: #2a2f3a;
    }

    .botao-salvar {
      background: #2d8cff;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 20px;
    }

    .box {
      background: #171a21;
      border: 1px solid #262b36;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }

    .box h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
    }

    .campo {
      margin-bottom: 16px;
    }

    .campo label {
      display: block;
      margin-bottom: 8px;
      color: #d5dbea;
      font-size: 0.95rem;
    }

    .campo input,
    .campo textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #313847;
      background: #0f1115;
      color: #fff;
      outline: none;
      font-size: 1rem;
    }

    .campo input[readonly] {
      opacity: 0.85;
      cursor: not-allowed;
    }

    .campo textarea {
      resize: vertical;
      min-height: 90px;
    }

    .lista-pontos {
      display: grid;
      gap: 10px;
      max-height: 500px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .item-ponto {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #10131a;
      border: 1px solid #2a3040;
      border-radius: 12px;
      padding: 12px;
    }

    .item-ponto input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #2d8cff;
      flex-shrink: 0;
    }

    .item-ponto-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .item-ponto-info strong {
      font-size: 0.96rem;
      color: #fff;
    }

    .item-ponto-info span {
      color: #bfc7d5;
      font-size: 0.88rem;
    }

    .mensagem {
      min-height: 24px;
      color: #9fd2ff;
      font-size: 0.95rem;
      margin-top: 10px;
      margin-bottom: 12px;
    }

    .resumo {
      background: #10131a;
      border: 1px solid #2a3040;
      border-radius: 14px;
      padding: 16px;
      line-height: 1.6;
      color: #c6cedd;
    }

    .resumo .linha {
      margin-bottom: 8px;
    }

    .vazio {
      color: #c6cedd;
      background: #10131a;
      border: 1px solid #2a3040;
      border-radius: 12px;
      padding: 16px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .topo h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topo">
      <div>
        <h1>Pasta do Cliente</h1>
        <p>Edite os dados do cliente e escolha os pontos liberados para esse código.</p>
      </div>

      <div class="acoes-topo">
        <button id="botaoVoltar" class="botao botao-voltar" type="button">Voltar</button>
        <button id="botaoSalvar" class="botao botao-salvar" type="button">Salvar</button>
      </div>
    </div>

    <p id="mensagem" class="mensagem"></p>

    <div class="grid">
      <div class="box">
        <h2>Dados do cliente</h2>

        <div class="campo">
          <label for="codigo">Código</label>
          <input type="text" id="codigo" readonly>
        </div>

        <div class="campo">
          <label for="nome">Nome</label>
          <input type="text" id="nome" placeholder="Nome do cliente">
        </div>

        <div class="campo">
          <label for="telefone">Telefone</label>
          <input type="text" id="telefone" placeholder="Telefone">
        </div>

        <div class="campo">
          <label for="empresa">Empresa</label>
          <input type="text" id="empresa" placeholder="Empresa">
        </div>

        <div class="campo">
          <label for="observacao">Observação</label>
          <textarea id="observacao" placeholder="Observações do cliente"></textarea>
        </div>
      </div>

      <div class="box">
        <h2>Resumo</h2>
        <div id="resumoCliente" class="resumo"></div>
      </div>
    </div>

    <div class="box" style="margin-top: 20px;">
      <h2>Pontos liberados</h2>
      <div id="listaPontos" class="lista-pontos"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="pasta-cliente.js?v=1"></script>
</body>
</html>
