<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f1115;
      color: #ffffff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .topo h1 {
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .topo p {
      color: #bfc7d5;
    }

    .acoes-topo {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .botao {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.2s ease;
      color: #fff;
    }

    .botao:hover {
      opacity: 0.92;
    }

    .botao-novo {
      background: #2d8cff;
      font-weight: bold;
    }

    .botao-atualizar {
      background: #2a2f3a;
    }

    .barra {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    .campo-busca input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #313847;
      background: #171a21;
      color: #fff;
      outline: none;
      font-size: 1rem;
    }

    .mensagem {
      min-height: 24px;
      color: #9fd2ff;
      font-size: 0.95rem;
      margin-bottom: 12px;
    }

    .lista-clientes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .cliente-card {
      background: #171a21;
      border: 1px solid #262b36;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
    }

    .cliente-card h3 {
      font-size: 1.1rem;
      margin-bottom: 10px;
    }

    .cliente-card p {
      color: #c6cedd;
      font-size: 0.94rem;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .cliente-card .acoes-card {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .cliente-card .acoes-card button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      color: #fff;
      font-size: 0.92rem;
    }

    .botao-abrir {
      background: #2d8cff;
    }

    .botao-excluir {
      background: #d9534f;
    }

    .vazio {
      background: #171a21;
      border: 1px solid #262b36;
      border-radius: 16px;
      padding: 24px;
      color: #c6cedd;
      text-align: center;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .topo h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topo">
      <div>
        <h1>Central de Clientes</h1>
        <p>Crie clientes novos e abra a página individual de cada um.</p>
      </div>

      <div class="acoes-topo">
        <button id="botaoNovoCliente" class="botao botao-novo" type="button">+ Novo cliente</button>
        <button id="botaoAtualizar" class="botao botao-atualizar" type="button">Atualizar</button>
      </div>
    </div>

    <div class="barra">
      <div class="campo-busca">
        <input type="text" id="buscaCliente" placeholder="Buscar por código, nome, empresa ou telefone">
      </div>
    </div>

    <p id="mensagem" class="mensagem"></p>

    <div id="listaClientes" class="lista-clientes"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="clientes.js?v=1"></script>
</body>
</html>
