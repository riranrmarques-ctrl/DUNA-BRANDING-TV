<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duna Branding | Apresentação</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
:root {
  --bg: #04070d;
  --bg-2: #07111d;
  --panel: rgba(10, 18, 31, 0.88);
  --panel-2: rgba(12, 22, 38, 0.92);
  --line: rgba(120, 162, 220, 0.14);
  --line-strong: rgba(120, 162, 220, 0.28);
  --text: #f4f8ff;
  --muted: #94a8c6;
  --accent: #5c95d6;
  --accent-2: #7da8d8;
  --accent-soft: rgba(92, 149, 214, 0.14);
  --success: #39d27d;
  --shadow: 0 18px 50px rgba(0, 0, 0, 0.38);
  --radius-xl: 28px;
  --radius-lg: 22px;
  --radius-md: 18px;
  --radius-sm: 14px;
  --container: 1260px;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html {
  scroll-behavior: smooth;
}
body {
  font-family: "Inter", system-ui, sans-serif;
  background:
    radial-gradient(circle at top right, rgba(92, 149, 214, 0.12), transparent 28%),
    radial-gradient(circle at top left, rgba(125, 168, 216, 0.06), transparent 22%),
    linear-gradient(180deg, #03060b 0%, #050a12 32%, #04070d 100%);
  color: var(--text);
  overflow-x: hidden;
}
a {
  color: inherit;
  text-decoration: none;
}
img {
  display: block;
  max-width: 100%;
}
.container {
  width: min(var(--container), calc(100% - 40px));
  margin: 0 auto;
}
.site-header {
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(14px);
  background: rgba(3, 7, 13, 0.72);
  border-bottom: 1px solid rgba(130, 164, 214, 0.08);
}
.header-inner {
  min-height: 84px;
  display: flex;
  align-items: center;
  gap: 24px;
}
.brand {
  display: flex;
  align-items: center;
}
.brand-logo {
  width: 172px;
  height: auto;
  object-fit: contain;
  display: block;
}
.nav {
  margin-left: auto;
  display: flex;
  align-items: center;
